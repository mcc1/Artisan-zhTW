name: Auto Localize Artisan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      workflow_mode:
        description: Workflow mode
        required: true
        default: build
        type: choice
        options:
          - extract
          - build
          - sync
      publish_release:
        description: Publish a GitHub Release asset
        required: true
        default: false
        type: boolean
      publish_dev_release:
        description: Update the fixed dev prerelease asset
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  artisan:
    uses: mcc1/dalamud-mod-localizer/.github/workflows/reusable-build-mod.yml@main
    secrets: inherit
    with:
      workflow_mode: ${{ github.event_name == 'schedule' && 'build' || inputs.workflow_mode }}
      mod_name: Artisan
      mod_version: "4.0.3.46-cn"
      mod_repo_url: https://github.com/MeowZWR/Artisan.git
      mod_ref: 8bd94a8d41817ae5263a99309edaf54adfd9d794
      mod_repo_dir: Artisan
      localizer_source_subpaths: Artisan
      localizer_dict_path: zh-TW.json
      build_project_path: Artisan/Artisan/Artisan.csproj
      package_build_dir: Artisan/Artisan/bin/Release
      artifact_basename: Artisan
      release_tag_prefix: artisan-v
      package_include_patterns: |
        *.dll
        *.json
        *.pdb
        *.exe
        Images/*.png
        Sounds/*.mp3
      dalamud_asset_url: https://github.com/yanmucorp/Dalamud/releases/download/25-12-26-01/latest.7z
      dalamud_assets_json_url: https://raw.githubusercontent.com/yanmucorp/DalamudAssets/master/assetCN.json
      dalamud_required_files: |
        Dalamud.dll
        Dalamud.Common.dll
        ImGui.NET.dll
        Lumina.dll
        Lumina.Excel.dll
        ImGuiScene.dll
        InteropGenerator.Runtime.dll
        FFXIVClientStructs.dll
      commit_changes: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_mode != 'build' }}
      publish_release: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}

  publish-dev:
    name: Publish Fixed Dev Prerelease
    needs: artisan
    if: ${{ (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && inputs.publish_dev_release && inputs.workflow_mode != 'extract') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEV_TAG: artisan-dev
      DEV_TITLE: Artisan-zhTW dev
      DEV_NOTES: Latest automated dev build for in-game testing install.
      ARTIFACT_PATTERN: Artisan-4.0.3.46-cn-*
      DEV_ASSET_NAME: Artisan-dev.zip
    steps:
      - name: Checkout Consumer Repo
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.ARTIFACT_PATTERN }}
          path: dist
          merge-multiple: true

      - name: Prepare Dev Package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          import zipfile
          from pathlib import Path

          def first_dev_version(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 4 or not all(part.isdigit() for part in parts):
                  raise SystemExit(f"Unsupported base version format for dev packaging: {version}")
              parts[-1] = f"{parts[-1]}01"
              return ".".join(parts)

          def increment_dev_version(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 4 or not all(part.isdigit() for part in parts):
                  raise SystemExit(f"Unsupported existing dev version format: {version}")
              parts[-1] = str(int(parts[-1]) + 1)
              return ".".join(parts)

          def read_existing_dev_version() -> str | None:
              existing_dir = Path("dist/existing-dev")
              existing_dir.mkdir(parents=True, exist_ok=True)
              try:
                  subprocess.run(
                      [
                          "gh",
                          "release",
                          "download",
                          "artisan-dev",
                          "--pattern",
                          "Artisan-dev.zip",
                          "--dir",
                          str(existing_dir),
                          "--repo",
                          "${{ github.repository }}",
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
              except subprocess.CalledProcessError:
                  return None

              zip_path = existing_dir / "Artisan-dev.zip"
              if not zip_path.exists():
                  return None

              with zipfile.ZipFile(zip_path) as zf:
                  with zf.open("Artisan.json") as fp:
                      manifest = json.load(fp)
              return manifest.get("AssemblyVersion")

          zip_candidates = sorted(Path("dist").glob("*.zip"))
          if not zip_candidates:
              raise SystemExit("No packaged zip found in dist/")
          zip_path = zip_candidates[0]
          temp_dir = Path("dist/unpacked")
          temp_dir.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(zip_path) as zf:
              zf.extractall(temp_dir)

          manifest_path = temp_dir / "Artisan.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8-sig"))
          existing_version = read_existing_dev_version()
          manifest["AssemblyVersion"] = (
              increment_dev_version(existing_version)
              if existing_version
              else first_dev_version(manifest["AssemblyVersion"])
          )
          manifest["Changelog"] = (
              "Dev testing channel. This prerelease tag is continuously updated "
              "by automation with the latest Artisan-zhTW build."
          )
          manifest_path.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          dev_zip = Path("dist") / "Artisan-dev.zip"
          with zipfile.ZipFile(dev_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(temp_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(temp_dir).as_posix())
          PY

      - name: Create or Update Fixed Dev Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$DEV_TAG" >/dev/null 2>&1; then
            gh release upload "$DEV_TAG" "dist/$DEV_ASSET_NAME" --clobber
            gh release edit "$DEV_TAG" --prerelease --title "$DEV_TITLE" --notes "$DEV_NOTES"
          else
            gh release create "$DEV_TAG" "dist/$DEV_ASSET_NAME" --prerelease --title "$DEV_TITLE" --notes "$DEV_NOTES"
          fi

  sync-plugin-source:
    name: Sync DalamudPlugins-zhTW
    needs:
      - artisan
      - publish-dev
    if: >-
      ${{
        (
          github.event_name == 'schedule' ||
          (
            github.event_name == 'workflow_dispatch' &&
            inputs.workflow_mode != 'extract' &&
            (inputs.publish_dev_release || inputs.publish_release)
          )
        ) &&
        needs.artisan.result == 'success' &&
        (needs.publish-dev.result == 'success' || needs.publish-dev.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions: {}
    env:
      TARGET_REPO: mcc1/DalamudPlugins-zhTW
      TARGET_WORKFLOW: sync-repo.yml
    steps:
      - name: Trigger Plugin Source Sync
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_SOURCE_SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PLUGIN_SOURCE_SYNC_TOKEN is not configured; skipping plugin source sync."
            exit 0
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$TARGET_REPO/dispatches" \
            -f event_type='sync-plugin-source' \
            -F client_payload[source_repo]="$GITHUB_REPOSITORY" \
            -F client_payload[source_run_id]="$GITHUB_RUN_ID"

  sync-gitlab-pages:
    name: Sync GitLab Pages repo.json
    needs:
      - sync-plugin-source
    if: ${{ needs.sync-plugin-source.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_REPO: mcc1/DalamudPlugins-zhTW
      TARGET_WORKFLOW: sync-repo.yml
      GITLAB_REPO_URL: https://oauth2:${{ secrets.GITLAB_PUSH_TOKEN }}@git.mccma.cc/mcc/dalamudplugins-zhtw.git
      GITLAB_REPO_BRANCH: master
    steps:
      - name: Wait for Plugin Source Sync run
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_SOURCE_SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PLUGIN_SOURCE_SYNC_TOKEN is not configured; cannot wait for repo.json sync."
            exit 1
          fi

          for attempt in $(seq 1 30); do
            run_id="$(gh run list \
              --repo "$TARGET_REPO" \
              --workflow "$TARGET_WORKFLOW" \
              --event repository_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')"

            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              echo "Found sync run: $run_id"
              gh run watch "$run_id" --repo "$TARGET_REPO" --exit-status
              exit 0
            fi

            echo "Waiting for sync workflow run to appear..."
            sleep 10
          done

          echo "Timed out waiting for $TARGET_REPO/$TARGET_WORKFLOW repository_dispatch run."
          exit 1

      - name: Fetch latest repo.json from GitHub
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_SOURCE_SYNC_TOKEN }}
        run: |
          gh api "repos/$TARGET_REPO/contents/repo.json?ref=master" --jq .content | base64 -d > repo.json

      - name: Push repo.json to GitLab Pages repo
        run: |
          if [ -z "${{ secrets.GITLAB_PUSH_TOKEN }}" ]; then
            echo "GITLAB_PUSH_TOKEN is not configured; skipping GitLab Pages sync."
            exit 0
          fi

          git clone --branch "$GITLAB_REPO_BRANCH" "$GITLAB_REPO_URL" gitlab-pages
          cp repo.json gitlab-pages/repo.json

          cd gitlab-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json

          if git diff --cached --quiet; then
            echo "No repo.json changes to push."
            exit 0
          fi

          git commit -m "chore: sync repo.json from $GITHUB_REPOSITORY@$GITHUB_SHA"
          git push origin "$GITLAB_REPO_BRANCH"
